<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Chaves — Meu Roteiro (ADMIN)</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0c09;
    color: #f0e6d8;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .header img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
  h1 { font-size: 1.15rem; margin: 0; }
  .warn {
    background: rgba(232,134,44,0.08);
    border: 1px solid #4a3318;
    color: #e8862c;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 0.8rem; color: #b89a78; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%;
    background: #1d1510;
    border: 1px solid #3a2a1a;
    color: #f0e6d8;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 1rem;
    margin-bottom: 16px;
    font-family: monospace;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    background: linear-gradient(90deg, #e8862c 0%, #f0a850 100%);
    color: #1a0f00;
    border: none;
    border-radius: 11px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .resultado {
    margin-top: 20px;
    background: #171310;
    border: 1px solid #3a2a1a;
    border-radius: 12px;
    padding: 16px;
    display: none;
  }
  .resultado.show { display: block; }
  .chave {
    font-family: monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: #f0a850;
    word-break: break-all;
    margin: 10px 0;
    letter-spacing: 0.02em;
  }
  .meta { font-size: 0.8rem; color: #b89a78; }
  .presets { display: flex; gap: 6px; margin-bottom: 16px; }
  .presets button {
    flex: 1;
    background: #1d1510;
    color: #f0e6d8;
    border: 1px solid #3a2a1a;
    padding: 8px;
    font-size: 0.82rem;
    font-weight: 600;
  }
</style>
</head>

  <h1>Gerador de Chaves<br><span style="color:#b89a78; font-size:0.8rem; font-weight:600;">Meu Roteiro · uso administrativo</span></h1>
</div>
<div class="warn">⚠️ Uso interno/admin. Não compartilhe esta página — qualquer pessoa com acesso a ela pode gerar chaves válidas.</div>

<label>ID do aparelho (enviado pelo usuário)</label>
<input type="text" id="deviceId" placeholder="Ex: ABCD-1234-EFGH-5678">

<label>Validade (dias)</label>
<input type="number" id="dias" value="365" min="1" max="3650">
<div class="presets">
  <button onclick="document.getElementById('dias').value=30">30 dias</button>
  <button onclick="document.getElementById('dias').value=90">90 dias</button>
  <button onclick="document.getElementById('dias').value=365">1 ano</button>
  <button onclick="document.getElementById('dias').value=3650">Vitalícia</button>
</div>

<button onclick="gerarChave()">Gerar chave</button>

<div class="resultado" id="resultado">
  <div class="meta">Chave de ativação:</div>
  <div class="chave" id="chaveOutput"></div>
  <div class="meta" id="metaOutput"></div>
</div>

<script>
const TR_SECRET = "6kiRU0WPzQiUvmxFFXNs0RrC"; // mesma SECRET do app.js do Meu Roteiro — nao alterar sem trocar nos dois lugares

function diasParaHex(dias) {
  return dias.toString(16).toUpperCase().padStart(dias > 255 ? 3 : 2, '0');
}

async function sha256(texto) {
  const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function gerarChave() {
  const deviceId = document.getElementById('deviceId').value.trim().toUpperCase();
  const dias = parseInt(document.getElementById('dias').value, 10);

  if (!deviceId) {
    alert('Informe o ID do aparelho.');
    return;
  }
  if (!dias || dias <= 0) {
    alert('Informe uma validade em dias maior que zero.');
    return;
  }

  const diasHex = diasParaHex(dias);
  const hash = await sha256(`${deviceId}|${diasHex}|${TR_SECRET}`);
  const hashFormatado = hash.toUpperCase().slice(0, 16).match(/.{4}/g).join('-');
  const chave = `${diasHex}-${hashFormatado}`;

  document.getElementById('chaveOutput').textContent = chave;
  const validaAte = new Date();
  validaAte.setDate(validaAte.getDate() + dias);
  document.getElementById('metaOutput').textContent =
    `Válida por ${dias} dia(s) a partir da ativação (até aprox. ${validaAte.toLocaleDateString('pt-BR')}, contando da data de uso)`;
  document.getElementById('resultado').classList.add('show');
}
</script>
